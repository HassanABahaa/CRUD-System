<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRUD System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-dark">

    <!-- Header -->
    <div class="bg-black text-center py-4 mb-4 shadow-sm">
        <h1 class="display-4 fw-bold text-danger">
            CRUD <span class="text-white bg-danger px-2 rounded">System</span>
        </h1>
        <p class="text-secondary fs-5 mb-0">Manage your products easily</p>
    </div>

    <!-- Form -->
    <div class="container">
        <div class="card shadow-sm p-4 mb-4">
            <input id="prodName" type="text" class="form-control my-2" placeholder="Enter product name">
            <input id="prodPrice" type="number" class="form-control my-2" placeholder="Enter product price">
            <textarea id="prodDesc" class="form-control my-2" rows="3"
                placeholder="Enter product description"></textarea>
            <div>
                <button id="saveBtn" onclick="getProduct()" class="btn btn-danger mt-2">Add Product</button>
                <button id="cancelBtn" onclick="cancelEdit()" class="btn btn-secondary mt-2"
                    style="display:none">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Table -->
    <div class="container">
        <div class="rounded overflow-hidden shadow-sm">
            <table class="table table-dark table-striped table-hover mb-0">
                <thead>
                    <tr>
                        <th>name</th>
                        <th>price</th>
                        <th>description</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody id="body"></tbody>
            </table>
        </div>
    </div>

    <script src="main.js"></script>
</body>

</html>
